spring:
  application:
    name: bus-ticket-booking

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create   # ✅ create tables automatically
    show-sql: true
    properties:
      hibernate:
        format_sql: true

    defer-datasource-initialization: true   # ✅ VERY IMPORTANT (fixes your error)

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8082